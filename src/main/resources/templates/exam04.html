<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exam04</title>
    <style>
        .error-messages {
            color: red;
        }
    </style>
</head>
<body>
<h1>ユーザ登録</h1>
<form action="exam04-result.html" th:action="@{/exam04/exam04Result}" th:object="${userForm}" method="post">
    <label th:errors="*{name}" class="error-messages">
        氏名を入力してください
    </label>
    <br>
    <label for="name">
        名前:
        <input type="text" name="name" id="name" th:field="*{name}">
    </label>
    <br>
    <label th:errors="*{age}" class="error-messages">
        年齢を入力してください
    </label>
    <br>
    <label for="age">
        年齢:
        <input type="text" name="age" id="age" th:field="*{age}">
    </label>
    <br>
    <label th:errors="*{comment}" class="error-messages">
        コメントを入力してください
    </label>
    <br>
    <label for="comment">
        コメント:
    </label>
    <br>
    <textarea name="comment" id="comment" cols="30" rows="10" th:field="*{comment}"></textarea>
    <br>
    <button>登録</button>
</form>
</body>
</html>
